name: OH DMV Scraper

on:
  schedule:
    # All times Eastern. UTC offsets assume EDT (UTC-4).
    - cron: '0 12 * * 1-6'    # 8:00 AM ET
    - cron: '30 12 * * 1-6'   # 8:30 AM ET
    - cron: '0 14 * * 1-6'    # 10:00 AM ET
    - cron: '30 16 * * 1-6'   # 12:30 PM ET
    - cron: '0 18 * * 1-6'    # 2:00 PM ET
    - cron: '30 19 * * 1-5'   # 3:30 PM ET
    - cron: '0 21 * * 1-5'    # 5:00 PM ET
    - cron: '0 22 * * 1-5'    # 6:00 PM ET
    - cron: '0 16 * * 6'      # 12:00 PM ET (Saturday)
  workflow_dispatch:

jobs:
  call-scraper:
    uses: ./.github/workflows/_scraper-template.yml
    with:
      target_repo: mdostp/oh-dmv-scraper   # <-- replace OWNER with your GitHub username/org
      python_version: '3.11'
      pip_packages: 'requests pandas beautifulsoup4'
      run_commands: |
        python ohio_wait_times_scraper.py --once
      commit_paths: '*.csv'
    secrets:
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
