name: OK DMV Scraper

on:
  schedule:
    # All times Central Daylight Time (CDT = UTC-5)
    - cron: '30 13 * * 1-5'   #  8:30 AM CDT
    - cron: '30 16 * * 1-5'   # 11:30 AM CDT
    - cron: '0 19 * * 1-5'    #  2:00 PM CDT
    - cron: '0 22 * * 1-5'    #  5:00 PM CDT
  workflow_dispatch:

# Inlined (not using _scraper-template.yml) because Playwright requires
# explicit cache + install steps that can't be expressed as template inputs.

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out private repo
        uses: actions/checkout@v4
        with:
          repository: mdostp/ok-dmv-scraper
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-playwright-1.49.0

      - name: Install dependencies
        run: pip install playwright==1.49.0

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-1.49.0

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Install Playwright system dependencies
        run: playwright install-deps chromium

      - name: Pull latest before running
        run: git pull --rebase || true

      - name: Run scraper
        run: python ok_dvs_scraper.py --once --output ok_waittimes.csv

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot
          path: failure.png

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ok_waittimes.csv
          git commit -m "Update data $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git pull --rebase || true
          git push
