name: MN DVS Appointment Scraper

on:
  schedule:
    # All times Central Daylight Time (CDT = UTC-5)
    - cron: '0 13 * * 1-5'   # 8:00 AM CDT
    - cron: '0 21 * * 1-5'   # 4:00 PM CDT
  workflow_dispatch:

# Inlined (not using _scraper-template.yml) because Playwright requires
# explicit cache + install steps that can't be expressed as template inputs.

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out private repo
        uses: actions/checkout@v4
        with:
          repository: mdostp/mn-dmv-appt-avail
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-playwright-1.49.0

      - name: Install dependencies
        run: pip install playwright==1.49.0

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-1.49.0

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Pull latest before running
        run: git pull --rebase || true

      - name: Run scraper
        run: python mn_dvs_scraper.py --once --output mn_dvs_appointments.csv

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mn_dvs_appointments.csv
          git commit -m "Update data $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git pull --rebase || true
          git push
