name: VA DMV Appointment Availability Scraper

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 8:00 AM ET  (UTC-5 EST / UTC-4 EDT)
    - cron: '0 17 * * 1-5'   # 12:00 PM ET
    - cron: '0 21 * * 1-5'   # 4:00 PM ET
  workflow_dispatch:

# This workflow does NOT use the reusable _scraper-template.yml because
# Selenium requires a real Chrome binary installed via browser-actions/setup-chrome,
# which can't be expressed as a template input. It's inlined here instead.

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Check out private repo
        uses: actions/checkout@v4
        with:
          repository: mdostp/va-dmv-appt-avail
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install selenium

      - name: Pull latest before running
        run: git pull --rebase || true

      - name: Run scraper
        run: python VA_appointments.py --once --output VA_appointments.csv

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VA_appointments.csv
          git commit -m "Update data $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git pull --rebase || true
          git push
